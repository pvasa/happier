name: DEPLOY — On Deploy Branch Push

on:
  push:
    branches:
      - "deploy/**"

permissions:
  contents: read

concurrency:
  group: deploy-branch-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          trusted_actors: happier-release-bot[bot]
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  target:
    name: Resolve deploy target
    needs: [release_actor_guard]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      environment: ${{ steps.parse.outputs.environment }}
      component: ${{ steps.parse.outputs.component }}
      confirm: ${{ steps.parse.outputs.confirm }}
    steps:
      - name: Parse deploy branch name
        id: parse
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ref="${REF_NAME}"
          if [[ "${ref}" =~ ^deploy/(preview|production)/(ui|server|website|docs)$ ]]; then
            env_name="${BASH_REMATCH[1]}"
            component="${BASH_REMATCH[2]}"
            echo "environment=${env_name}" >> "$GITHUB_OUTPUT"
            echo "component=${component}" >> "$GITHUB_OUTPUT"
            echo "confirm=deploy ${env_name} ${component}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported deploy branch ref: ${ref}" >&2
          echo "Expected: deploy/<preview|production>/<ui|server|website|docs>" >&2
          exit 1

  deploy:
    name: Deploy (webhooks)
    needs: [target]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: ${{ needs.target.outputs.environment }}
      component: ${{ needs.target.outputs.component }}
      confirm: ${{ needs.target.outputs.confirm }}
