name: PUBLISH — GitHub Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      title:
        required: true
        type: string
      target_sha:
        required: true
        type: string
      prerelease:
        required: true
        type: boolean
      rolling_tag:
        required: true
        type: boolean
      generate_notes:
        required: true
        type: boolean
      notes:
        required: false
        default: ""
        type: string
      assets:
        required: false
        default: ""
        type: string
      assets_dir:
        required: false
        default: ""
        type: string
      assets_artifact:
        required: false
        default: ""
        type: string
      assets_artifact_path:
        required: false
        default: dist/release-assets
        type: string
      clobber:
        required: false
        default: true
        type: boolean
      prune_assets:
        required: false
        default: false
        type: boolean
      release_message:
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-github-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  publish:
    needs: [release_actor_guard]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release-shared
    env:
      RELEASE_BOT_APP_ID: ${{ secrets.RELEASE_BOT_APP_ID }}
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Create GitHub App token (release bot)
        id: app_token
        uses: actions/create-github-app-token@v1
        if: ${{ env.RELEASE_BOT_APP_ID != '' && env.RELEASE_BOT_PRIVATE_KEY != '' }}
        with:
          app-id: ${{ env.RELEASE_BOT_APP_ID }}
          private-key: ${{ env.RELEASE_BOT_PRIVATE_KEY }}

      - name: Configure git remote auth (release bot)
        if: ${{ steps.app_token.outcome == 'success' && steps.app_token.outputs.token != '' }}
        env:
          TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Ensure we aren't still using GITHUB_TOKEN credentials from checkout.
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true

      - name: Download release assets artifact
        if: ${{ inputs.assets_artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.assets_artifact }}
          path: ${{ inputs.assets_artifact_path }}

      - name: Publish GitHub release (pipeline)
        env:
          GH_TOKEN: ${{ (steps.app_token.outputs.token != '' && steps.app_token.outputs.token) || github.token }}
          GH_REPO: ${{ github.repository }}
          NOTES: ${{ inputs.notes }}
          ASSETS: ${{ inputs.assets }}
          assets_dir: ${{ inputs.assets_dir }}
          release_message: ${{ inputs.release_message }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs github-publish-release \
            --tag "${{ inputs.tag }}" \
            --title "${{ inputs.title }}" \
            --target-sha "${{ inputs.target_sha }}" \
            --prerelease "${{ inputs.prerelease }}" \
            --rolling-tag "${{ inputs.rolling_tag }}" \
            --generate-notes "${{ inputs.generate_notes }}" \
            --notes "${NOTES}" \
            --assets "${ASSETS}" \
            --assets-dir "${assets_dir}" \
            --clobber "${{ inputs.clobber }}" \
            --prune-assets "${{ inputs.prune_assets }}" \
            --release-message "${release_message}"
