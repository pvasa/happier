name: "Roadmap: Bootstrap Labels"

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: Update label descriptions/colors if they already exist.
        required: false
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate actor permissions
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const { owner, repo } = context.repo;
            const result = await github.rest.repos.getCollaboratorPermissionLevel({ owner, repo, username: actor });
            const allowed = new Set(['admin', 'maintain', 'write', 'triage']);
            if (!allowed.has(result.data.permission)) {
              core.setFailed(`Actor '${actor}' does not have permission to bootstrap labels.`);
            }

      - name: Create/update roadmap labels
        uses: actions/github-script@v7
        with:
          script: |
            const force = Boolean(${{ inputs.force_update }});
            const { owner, repo } = context.repo;

            /** @type {Array<{name: string, color: string, description: string}>} */
            const labels = [
              { name: 'roadmap', color: '5319e7', description: 'Include on the public roadmap project.' },

              { name: 'priority:p0', color: 'b60205', description: 'Drop-everything priority.' },
              { name: 'priority:p1', color: 'd93f0b', description: 'High priority.' },
              { name: 'priority:p2', color: 'fbca04', description: 'Normal priority.' },
              { name: 'priority:p3', color: 'c2e0c6', description: 'Low priority.' },

              { name: 'stage:not-shipped', color: 'bfdadc', description: 'Not shipped yet.' },
              { name: 'stage:experimental', color: '1d76db', description: 'Shipped behind experimental / preview.' },
              { name: 'stage:beta', color: '0e8a16', description: 'Shipped to beta users.' },
              { name: 'stage:ga', color: '0052cc', description: 'Generally available.' },

              { name: 'type: bug', color: 'd73a4a', description: 'Bug or regression.' },
              { name: 'type: feature', color: 'a2eeef', description: 'New feature or enhancement.' },
              { name: 'type: task', color: 'ededed', description: 'Internal task or chore.' },

              { name: 'source: bug-report', color: 'fef2c0', description: 'Created from in-app bug report.' },
              { name: 'ai-triage', color: 'cfd3d7', description: 'Needs maintainer triage.' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner, repo, name: label.name, color: label.color, description: label.description });
                core.info(`Created label: ${label.name}`);
              } catch (error) {
                const status = error?.status;
                // 422: already exists (or validation); treat as "exists" for our purposes.
                if (status !== 422) throw error;
                if (!force) {
                  core.info(`Label exists (skipped): ${label.name}`);
                  continue;
                }
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
                core.info(`Updated label: ${label.name}`);
              }
            }
