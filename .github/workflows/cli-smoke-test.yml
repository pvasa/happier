name: CI — CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:
    inputs:
      run_windows_settings_lock_repro:
        description: "Run the compiled Windows settings.json.lock repro job"
        required: true
        type: boolean
        default: false
      windows_settings_lock_repro_release_tag:
        description: "CLI release tag to reproduce with"
        required: false
        type: string
        default: "cli-v0.2.3-dev.36.1"

jobs:
  smoke-test-linux:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_windows_settings_lock_repro != true }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      env:
        YARN_PRODUCTION: "false"
        npm_config_production: "false"
        # Speed up installs: CLI smoke tests do not require UI web-only vendored assets.
        HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
      run: yarn install --frozen-lockfile --ignore-engines

    - name: CLI smoke (pipeline)
      run: node scripts/pipeline/run.mjs smoke-cli

  smoke-test-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_windows_settings_lock_repro != true }}
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      env:
        YARN_PRODUCTION: "false"
        npm_config_production: "false"
        # Speed up installs: CLI smoke tests do not require UI web-only vendored assets.
        HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
      run: yarn install --frozen-lockfile --ignore-engines

    - name: CLI smoke (pipeline)
      run: node scripts/pipeline/run.mjs smoke-cli

  settings-lock-repro-windows:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_windows_settings_lock_repro == true }}
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Prepare repro diagnostics directory
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $diagDir = Join-Path $env:RUNNER_TEMP "happier-cli-win-lock-repro-diagnostics"
        "HAPPIER_REPRO_DIAG_DIR=$diagDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        New-Item -ItemType Directory -Path $diagDir -Force | Out-Null
        "workflow-start=$([DateTime]::UtcNow.ToString('o'))" | Set-Content -Path (Join-Path $diagDir "workflow-start.txt") -Encoding utf8

    - name: Enable Corepack
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare yarn@1.22.22 --activate

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.5

    - name: Standalone Bun fs.open lock probe
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $diagDir = $env:HAPPIER_REPRO_DIAG_DIR
        $probeRoot = Join-Path $env:RUNNER_TEMP "happier-bun-open-probe"
        $scriptPath = Join-Path $probeRoot "fs-open-lock-probe.mjs"
        $binaryPath = Join-Path $probeRoot "fs-open-lock-probe.exe"
        $probeHomeDir = Join-Path $probeRoot ".happier"
        $probeSettingsPath = Join-Path $probeHomeDir "settings.json"
        $probeLockPath = "$probeSettingsPath.lock"

        if (Test-Path $probeRoot) {
          Remove-Item -Recurse -Force $probeRoot
        }
        New-Item -ItemType Directory -Path $probeRoot -Force | Out-Null

        @'
        import { constants } from 'node:fs';
        import { mkdir, open, rm, writeFile } from 'node:fs/promises';
        import { dirname } from 'node:path';

        const mode = process.argv[2];
        const targetPath = process.argv[3];
        const prepare = process.argv[4] ?? 'dir';

        if (!mode || !targetPath) {
          throw new Error('usage: <numeric|wx> <targetPath> [dir|empty-settings]');
        }

        const parentDir = dirname(targetPath);
        await rm(parentDir, { recursive: true, force: true }).catch(() => {});
        await mkdir(parentDir, { recursive: true });
        if (prepare === 'empty-settings') {
          await writeFile(targetPath.replace(/\.lock$/, ''), '');
        }

        const flags = mode === 'numeric'
          ? constants.O_CREAT | constants.O_EXCL | constants.O_WRONLY
          : 'wx';

        try {
          const handle = await open(targetPath, flags);
          await handle.close();
          console.log(JSON.stringify({ ok: true, mode, prepare, targetPath }));
        } catch (error) {
          const err = error;
          console.error(JSON.stringify({
            ok: false,
            mode,
            prepare,
            targetPath,
            code: err && typeof err === 'object' && 'code' in err ? err.code : null,
            message: err instanceof Error ? err.message : String(err),
          }));
          process.exit(1);
        }
        '@ | Set-Content -Path $scriptPath -Encoding utf8

        bun build --compile --target bun-windows-x64 $scriptPath --outfile $binaryPath

        function Invoke-Probe {
          param(
            [Parameter(Mandatory = $true)][string] $Label,
            [Parameter(Mandatory = $true)][string] $Executable,
            [Parameter(Mandatory = $true)][string[]] $Arguments
          )

          $stdoutPath = Join-Path $diagDir "$Label.stdout.txt"
          $stderrPath = Join-Path $diagDir "$Label.stderr.txt"
          $metaPath = Join-Path $diagDir "$Label.meta.json"

          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $Executable
          $psi.WorkingDirectory = $env:USERPROFILE
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true

          foreach ($argument in $Arguments) {
            [void]$psi.ArgumentList.Add($argument)
          }

          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $psi
          [void]$process.Start()
          [void]$process.WaitForExit()

          $stdout = $process.StandardOutput.ReadToEnd()
          $stderr = $process.StandardError.ReadToEnd()

          Set-Content -Path $stdoutPath -Value $stdout -Encoding utf8
          Set-Content -Path $stderrPath -Value $stderr -Encoding utf8
          @{
            label = $Label
            executable = $Executable
            arguments = $Arguments
            exitCode = $process.ExitCode
          } | ConvertTo-Json -Depth 4 | Set-Content -Path $metaPath -Encoding utf8
        }

        Invoke-Probe -Label "node-probe-numeric-dir" -Executable "node" -Arguments @($scriptPath, "numeric", $probeLockPath, "dir")
        Invoke-Probe -Label "node-probe-wx-dir" -Executable "node" -Arguments @($scriptPath, "wx", $probeLockPath, "dir")
        Invoke-Probe -Label "node-probe-numeric-empty-settings" -Executable "node" -Arguments @($scriptPath, "numeric", $probeLockPath, "empty-settings")
        Invoke-Probe -Label "node-probe-wx-empty-settings" -Executable "node" -Arguments @($scriptPath, "wx", $probeLockPath, "empty-settings")
        Invoke-Probe -Label "bun-probe-numeric-dir" -Executable "bun" -Arguments @($scriptPath, "numeric", $probeLockPath, "dir")
        Invoke-Probe -Label "bun-probe-wx-dir" -Executable "bun" -Arguments @($scriptPath, "wx", $probeLockPath, "dir")
        Invoke-Probe -Label "bun-probe-numeric-empty-settings" -Executable "bun" -Arguments @($scriptPath, "numeric", $probeLockPath, "empty-settings")
        Invoke-Probe -Label "bun-probe-wx-empty-settings" -Executable "bun" -Arguments @($scriptPath, "wx", $probeLockPath, "empty-settings")
        Invoke-Probe -Label "compiled-probe-numeric-dir" -Executable $binaryPath -Arguments @("numeric", $probeLockPath, "dir")
        Invoke-Probe -Label "compiled-probe-wx-dir" -Executable $binaryPath -Arguments @("wx", $probeLockPath, "dir")
        Invoke-Probe -Label "compiled-probe-numeric-empty-settings" -Executable $binaryPath -Arguments @("numeric", $probeLockPath, "empty-settings")
        Invoke-Probe -Label "compiled-probe-wx-empty-settings" -Executable $binaryPath -Arguments @("wx", $probeLockPath, "empty-settings")

    - name: Download Windows CLI release asset
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $ErrorActionPreference = "Stop"
        $tag = "${{ inputs.windows_settings_lock_repro_release_tag }}"
        if (-not $tag) {
          throw "Missing windows_settings_lock_repro_release_tag input"
        }

        $downloadsDir = Join-Path $env:RUNNER_TEMP "happier-cli-release-download"
        if (Test-Path $downloadsDir) {
          Remove-Item -Recurse -Force $downloadsDir
        }
        New-Item -ItemType Directory -Path $downloadsDir -Force | Out-Null

        gh release download $tag --repo happier-dev/happier --pattern "happier-v*-windows-x64.tar.gz" --dir $downloadsDir

        @(
          "releaseTag=$tag"
          "downloadsDir=$downloadsDir"
        ) | Set-Content -Path (Join-Path $env:HAPPIER_REPRO_DIAG_DIR "release-download.txt") -Encoding utf8

    - name: Extract Windows CLI binary
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $downloadsDir = Join-Path $env:RUNNER_TEMP "happier-cli-release-download"
        $archive = Get-ChildItem -Path $downloadsDir -Filter "happier-v*-windows-x64.tar.gz" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if (-not $archive) {
          throw "Missing downloaded Windows CLI archive under $downloadsDir"
        }

        $installRoot = Join-Path $env:SystemDrive "bin"
        New-Item -ItemType Directory -Path $installRoot -Force | Out-Null
        tar -xzf $archive.FullName -C $installRoot

        $binary = Get-ChildItem -Path $installRoot -Filter "happier.exe" -Recurse | Where-Object { $_.FullName -like "*happier-v*-windows-x64*" } | Select-Object -First 1
        if (-not $binary) {
          throw "Missing happier.exe after extracting $($archive.FullName)"
        }

        $binaryDir = Split-Path -Parent $binary.FullName
        "HAPPIER_BINARY=$($binary.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        $binaryDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

        @(
          "archive=$($archive.FullName)"
          "installRoot=$installRoot"
          "binary=$($binary.FullName)"
          "binaryDir=$binaryDir"
        ) | Set-Content -Path (Join-Path $env:HAPPIER_REPRO_DIAG_DIR "release-extract.txt") -Encoding utf8

    - name: Seed auth state and run repro
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $diagDir = $env:HAPPIER_REPRO_DIAG_DIR
        New-Item -ItemType Directory -Path $diagDir -Force | Out-Null

        $homeDir = Join-Path $env:USERPROFILE ".happier"
        $serversDir = Join-Path $homeDir "servers"
        $cloudDir = Join-Path $serversDir "cloud"
        $accessKeyPath = Join-Path $cloudDir "access.key"
        $settingsPath = Join-Path $homeDir "settings.json"
        $lockPath = "$settingsPath.lock"

        if (Test-Path $homeDir) {
          Remove-Item -Recurse -Force $homeDir
        }

        New-Item -ItemType Directory -Path $cloudDir -Force | Out-Null

        function ConvertTo-Base64([byte[]] $bytes) {
          return [Convert]::ToBase64String($bytes)
        }

        function ConvertTo-Base64UrlJson([string] $json) {
          $encoded = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($json))
          return $encoded.TrimEnd('=').Replace('+', '-').Replace('/', '_')
        }

        $header = ConvertTo-Base64UrlJson '{"alg":"HS256","typ":"JWT"}'
        $payload = ConvertTo-Base64UrlJson '{"sub":"github-actions-repro-user"}'
        $token = "$header.$payload.signature"

        $credentials = @{
          token = $token
          encryption = @{
            publicKey = ConvertTo-Base64 ([byte[]](1..32))
            machineKey = ConvertTo-Base64 ([byte[]](65..96))
          }
        } | ConvertTo-Json -Depth 5

        Set-Content -Path $accessKeyPath -Value $credentials -Encoding utf8

        @(
          "binary=$env:HAPPIER_BINARY"
          "userprofile=$env:USERPROFILE"
          "homeDir=$homeDir"
          "settingsPath=$settingsPath"
          "lockPath=$lockPath"
        ) | Set-Content -Path (Join-Path $diagDir "environment.txt") -Encoding utf8

        function Invoke-HappierCapture {
          param(
            [Parameter(Mandatory = $true)][string] $Label,
            [string[]] $Arguments = @(),
            [int] $TimeoutSeconds = 20,
            [string] $WorkingDirectory = $env:USERPROFILE,
            [string] $Executable = $env:HAPPIER_BINARY
          )

          $stdoutPath = Join-Path $diagDir "$Label.stdout.txt"
          $stderrPath = Join-Path $diagDir "$Label.stderr.txt"
          $metaPath = Join-Path $diagDir "$Label.meta.json"

          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $Executable
          $psi.WorkingDirectory = $WorkingDirectory
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.Environment["DEBUG"] = "1"
          $psi.Environment["HAPPIER_NONINTERACTIVE"] = "1"
          $psi.Environment["HAPPIER_SESSION_AUTOSTART_DAEMON"] = "0"

          if ($Arguments) {
            foreach ($argument in $Arguments) {
              [void]$psi.ArgumentList.Add($argument)
            }
          }

          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $psi
          [void]$process.Start()

          $timedOut = -not $process.WaitForExit($TimeoutSeconds * 1000)
          if ($timedOut) {
            try {
              $process.Kill($true)
            } catch {
            }
            [void]$process.WaitForExit()
          }

          $stdout = $process.StandardOutput.ReadToEnd()
          $stderr = $process.StandardError.ReadToEnd()

          Set-Content -Path $stdoutPath -Value $stdout -Encoding utf8
          Set-Content -Path $stderrPath -Value $stderr -Encoding utf8

          @{
            label = $Label
            arguments = $Arguments
            exitCode = $process.ExitCode
            timedOut = $timedOut
          } | ConvertTo-Json -Depth 4 | Set-Content -Path $metaPath -Encoding utf8

          Write-Host "== $Label =="
          Write-Host "exitCode=$($process.ExitCode) timedOut=$timedOut"
          if ($stdout) {
            Write-Host "-- stdout --"
            Write-Host $stdout
          }
          if ($stderr) {
            Write-Host "-- stderr --"
            Write-Host $stderr
          }
        }

        $preflight = @(
          "Test-Path homeDir: $(Test-Path $homeDir)"
          "Test-Path homeDir container: $(Test-Path $homeDir -PathType Container)"
          "Test-Path access.key: $(Test-Path $accessKeyPath)"
        )
        $preflight | Set-Content -Path (Join-Path $diagDir "preflight.txt") -Encoding utf8

        Invoke-HappierCapture -Label "auth-status" -Arguments @("auth", "status")
        Invoke-HappierCapture -Label "auth-status-path" -Arguments @("auth", "status") -Executable "happier"
        Invoke-HappierCapture -Label "auth-status-repo-root" -Arguments @("auth", "status") -WorkingDirectory $PWD.Path

        New-Item -ItemType File -Path $lockPath -Force | Out-Null
        Get-Item $lockPath | Format-List FullName,Length,Attributes | Out-File -FilePath (Join-Path $diagDir "manual-lock-probe.txt") -Encoding utf8
        Remove-Item $lockPath -Force

        Invoke-HappierCapture -Label "auth-login" -Arguments @("auth", "login")
        Invoke-HappierCapture -Label "auth-login-path" -Arguments @("auth", "login") -Executable "happier"
        Invoke-HappierCapture -Label "default-command" -Arguments @() -TimeoutSeconds 30
        Invoke-HappierCapture -Label "default-command-path" -Arguments @() -TimeoutSeconds 30 -Executable "happier"
        Invoke-HappierCapture -Label "default-command-repo-root" -Arguments @() -TimeoutSeconds 30 -WorkingDirectory $PWD.Path
        Invoke-HappierCapture -Label "auth-login-force" -Arguments @("auth", "login", "--force")
        Invoke-HappierCapture -Label "auth-login-force-path" -Arguments @("auth", "login", "--force") -Executable "happier"

        if (Test-Path $homeDir) {
          Copy-Item -Path $homeDir -Destination (Join-Path $diagDir "happier-home-final") -Recurse -Force
        }

    - name: Upload repro diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: windows-cli-settings-lock-repro
        path: ${{ runner.temp }}/happier-cli-win-lock-repro-diagnostics
        if-no-files-found: error

# We don't need a smoke test for macOS because most contributors are developing on macOS.
