name: CI — CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      env:
        YARN_PRODUCTION: "false"
        npm_config_production: "false"
        # Speed up installs: CLI smoke tests do not require UI web-only vendored assets.
        HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
      uses: ./.github/actions/install-yarn-dependencies
      with:
        args: --frozen-lockfile --ignore-engines

    - name: CLI smoke (pipeline)
      run: node scripts/pipeline/run.mjs smoke-cli

  smoke-test-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      env:
        YARN_PRODUCTION: "false"
        npm_config_production: "false"
        # Speed up installs: CLI smoke tests do not require UI web-only vendored assets.
        HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
      uses: ./.github/actions/install-yarn-dependencies
      with:
        args: --frozen-lockfile --ignore-engines

    - name: CLI smoke (pipeline)
      run: node scripts/pipeline/run.mjs smoke-cli

# We don't need a smoke test for macOS because most contributors are developing on macOS.
