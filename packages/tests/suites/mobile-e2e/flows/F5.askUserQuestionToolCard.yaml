appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        id: welcome-configure-server
    file: _shared/configureServerIfNeeded.yaml

- runFlow:
    file: _shared/loginCreateAccount.yaml

- runFlow:
    file: _shared/openDevTools2.yaml

- tapOn:
    id: dev-tools2-filter:ask-user-question

- assertVisible:
    id: dev-tools2-example:askUserQuestion

# AskUserQuestion should render as a user-action card (not a permission approval footer).
- assertVisible:
    id: ask-user-question
- assertVisible:
    id: ask-user-question.option:0:0
- assertVisible:
    id: ask-user-question.option:0:1
- assertVisible:
    id: ask-user-question.submit
