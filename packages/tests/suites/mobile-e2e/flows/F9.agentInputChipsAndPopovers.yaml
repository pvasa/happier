appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- launchApp:
    clearState: true

- runFlow:
    file: _shared/connectDevClientIfNeeded.yaml

- runFlow:
    file: _shared/configureServerIfNeeded.yaml

- runFlow:
    file: _shared/loginCreateAccount.yaml

- runFlow:
    file: _shared/gotoNewSessionComposer.yaml

# Profile (model/effort presets) popover should open and be dismissible.
- assertVisible: agent-input-profile-chip
- tapOn: agent-input-profile-chip
- assertVisible: 'profiles-list-row:default-environment'
- tapOn:
    point: 10%,10%

# Agent chip picker popover should open and be dismissible.
- assertVisible: agent-input-agent-chip
- tapOn: agent-input-agent-chip
- assertVisible: 'agent-input-chip-picker.option:agent:codex'
- tapOn:
    point: 10%,10%

# Permission mode chip should open a simple options list and allow selection.
- assertVisible: agent-input-permission-chip
- tapOn: agent-input-permission-chip
- assertVisible: 'agent-input-simple-option:yolo'
- tapOn: 'agent-input-simple-option:yolo'
- tapOn:
    point: 10%,10%

# Session mode chip should open the mode selector surface.
- assertVisible: agent-input-session-mode-chip
- tapOn: agent-input-session-mode-chip
- assertVisible: 'agent-input-session-mode-option:plan'
- tapOn:
    point: 10%,10%
