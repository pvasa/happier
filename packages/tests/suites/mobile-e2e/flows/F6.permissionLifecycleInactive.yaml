appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- launchApp:
    clearState: true

- runFlow:
    file: _shared/connectDevClientIfNeeded.yaml

- runFlow:
    file: _shared/configureServerIfNeeded.yaml

- runFlow:
    file: _shared/loginCreateAccount.yaml

- runFlow:
    file: _shared/openDevTools2.yaml

- extendedWaitUntil:
    visible:
      id: 'dev-tools2-filter:permissions.pending'
    timeout: 240000

# Active session: a pending tool should show permission controls.
- tapOn:
    id: 'dev-tools2-filter:permissions.pending'
- assertVisible:
    id: permission-footer.allow
- assertVisible:
    id: permission-footer.deny

# Inactive provider/session: we should NOT show an actionable permission approval card.
# Instead, the tool is normalized to an error/canceled state (see `resolveInactiveSessionToolCallFailure`).
- tapOn:
    id: 'dev-tools2-filter:permissions.pending-inactive'
- assertNotVisible:
    id: permission-footer.allow
- assertNotVisible:
    id: permission-footer.deny
