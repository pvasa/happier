# Configures the server URL via deep-linking to the Server settings screen.
#
# Preconditions:
# - `HAPPIER_E2E_SERVER_URL` is set (passed via Maestro `-e`).
#
appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- runFlow:
    file: waitForWelcomeCreateAccount.yaml

- openLink: happier://server

- extendedWaitUntil:
    visible: server-settings-add-server-toggle
    timeout: 60000

- assertVisible: server-settings-add-server-toggle
- tapOn: server-settings-add-server-toggle

- assertVisible: server-settings-add-url-input
- tapOn: server-settings-add-url-input
- inputText: ${HAPPIER_E2E_SERVER_URL}

- tapOn: server-settings-add-confirm

# Return to welcome screen.
- openLink: happier://
