# Connect to Metro via the Expo Dev Client manual-entry form.
#
# Some Dev Client variants show "New development server" as a button that opens
# the form; others render it as the title of an already-expanded sheet. Only tap
# it when the Connect form is not already visible.
#
appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- runFlow:
    when:
      visible: "New development server"
    commands:
      - runFlow:
          when:
            notVisible: "Connect"
          commands:
            - tapOn: "New development server"

- assertVisible: "Connect"
- tapOn:
    point: 50%,44%
- eraseText
- inputText: ${HAPPIER_E2E_DEV_CLIENT_METRO_URL}
- tapOn:
    point: 50%,51%
