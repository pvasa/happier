# Open the Expo Dev Client launcher deep link first. This avoids brittle manual
# entry on Android and iOS while keeping the manual form as a fallback when the
# deep link is ignored or the Dev Client stays on its bootstrap surface.
#
# Preconditions:
# - `${HAPPIER_E2E_DEV_CLIENT_LAUNCH_URL}` is set (passed via Maestro `-e`).
#
appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- openLink: ${HAPPIER_E2E_DEV_CLIENT_LAUNCH_URL}
- extendedWaitUntil:
    visible: "(Open in .*|Open with .*|DEVELOPMENT SERVERS|Development servers|New development server|Enter URL manually|Connect|Error loading app|There was a problem loading the project|This is the developer menu.*|Continue|Go home|Go To Home|Loading from|Bundling.*|Downloading.*|Loading\\.\\.\\.|Login with mobile app|Create account|What would you like to work on\\?|Hi! How can I help you today\\?|Sessions|Start a session from your computer)"
    timeout: 300000
- runFlow:
    file: acceptIosOpenInPromptMaybe.yaml
- runFlow:
    file: acceptAndroidOpenWithPromptMaybe.yaml
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: "(Open with .*|DEVELOPMENT SERVERS|Development servers|New development server|Enter URL manually|Connect|Error loading app|There was a problem loading the project|This is the developer menu.*|Continue|Go home|Go To Home|Loading from|Bundling.*|Downloading.*|Loading\\.\\.\\.|Login with mobile app|Create account|What would you like to work on\\?|Hi! How can I help you today\\?|Sessions|Start a session from your computer)"
    timeout: 300000
- runFlow:
    file: acceptAndroidOpenWithPromptMaybe.yaml
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    file: dismissDeveloperMenuMaybe.yaml
- runFlow:
    file: dismissExpoDevMenuOverlayMaybe.yaml
- runFlow:
    when:
      visible: "(DEVELOPMENT SERVERS|Development servers|New development server|Enter URL manually|Connect)"
    commands:
      - runFlow:
          file: connectUsingManualEntry.yaml
