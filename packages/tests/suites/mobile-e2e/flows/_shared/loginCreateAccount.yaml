appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
# Create an anonymous account (no OAuth) from the Welcome screen.
- assertVisible:
    id: welcome-create-account
- tapOn:
    id: welcome-create-account

# After login, the Home header action for starting a new session should appear.
- assertVisible:
    id: home-header-start-new-session
